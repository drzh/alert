[smtp]
host = "smtp.gmail.com"
port = 587
username = "your-account@gmail.com"
password_env = "ALERT_SMTP_PASSWORD"
sender = "your-account@gmail.com"
recipients = ["your-account@gmail.com"]

[[sources]]
name = "spaceweather_com"
provider = "spaceweather_com"
db_file = "state/spaceweather_com.db"

[[sources.targets]]
url = "https://www.spaceweather.com/"

[[sources]]
name = "bz"
provider = "bz"
db_file = "state/bz.db"

[[sources.targets]]
url = "https://services.swpc.noaa.gov/products/solar-wind/mag-1-day.json"
threshold = -10

[[sources]]
name = "spaceweather_gov"
provider = "spaceweather_gov"
db_file = "state/spaceweather_gov.db"

[[sources.targets]]
url = "https://www.spaceweather.gov/news"

[[sources]]
name = "spaceweather_gov_alerts"
provider = "spaceweather_gov_alerts"
db_file = "state/spaceweather_gov_alerts.db"

[[sources.targets]]
url = "https://services.swpc.noaa.gov/products/alerts.json"

[[sources]]
name = "sd"
provider = "sd"
db_file = "state/sd.db"
keep_records = 1000000

[[sources.targets]]
name = "Academy"
url = "https://slickdeals.net/newsearch.php?q=academy&pp=20&sort=newest"
blacklist_file = "blacklists/sd.black"

[[sources.targets]]
name = "Atomic Clock"
url = "https://slickdeals.net/newsearch.php?q=atomic+clock&searcharea=deals&searchin=first&isUserSearch=1"
blacklist_file = "blacklists/sd.black"

[[sources]]
name = "aurora"
provider = "aurora"
db_file = "state/aurora.db"
email_title = "Aurora Alert"

[[sources.targets]]
url = "https://services.swpc.noaa.gov/text/3-day-forecast.txt"
threshold = 7
state_file = "state/aurora.val"
table_output_file = "output/aurora.3day.txt"

[[sources]]
name = "aurora_gfz"
provider = "aurora_gfz"
db_file = "state/aurora_gfz.db"

[[sources.targets]]
url = "https://kp.gfz-potsdam.de/fileadmin/kp-forecast.csv"
threshold = 7

[[sources]]
name = "cl"
provider = "cl"
db_file = "state/cl.db"

[[sources.targets]]
name = "Telescope"
url = "https://dallas.craigslist.org/search/sss?query=telescope#search=1~gallery~0~0"

[[sources.targets]]
name = "Ham Radio"
url = "https://dallas.craigslist.org/search/sss?query=ham%20radio#search=1~gallery~0~0"

[[sources]]
name = "cc"
provider = "cc"
db_file = "state/cc.db"

[[sources.targets]]
url = "http://www.uscreditcardguide.com/zh/"
blacklist_file = "blacklists/cc.black"

[[sources]]
name = "solarspot"
provider = "solarspot"
db_file = "state/solarspot.db"

[[sources.targets]]
url = "https://services.swpc.noaa.gov/text/srs.txt"
threshold = 700
state_file = "state/solarspot.val"

[[sources]]
name = "ariss"
provider = "ariss"
db_file = "state/ariss.db"
keep_records = 1000000

[[sources.targets]]
url = "http://ariss-sstv.blogspot.com/"

[[sources]]
name = "ha_comet"
provider = "ha_comet"
db_file = "state/ha_comet.db"
keep_records = 1000000

[[sources.targets]]
name = "Visible Comets"
url = "https://heavens-above.com/Comets.aspx?lat=32.82&lng=-96.82&loc=Unnamed&alt=0&tz=CST"
threshold = 6

[[sources.targets]]
name = "Visible Asteroids"
url = "https://heavens-above.com/Asteroids.aspx?lat=32.82&lng=-96.82&loc=Unnamed&alt=0&tz=CST"
threshold = 6

[[sources]]
name = "rocketlaunch"
provider = "rocketlaunch"
db_file = "state/rocketlaunch.db"

[[sources.targets]]
url = "https://www.rocketlaunch.live/"

[[sources]]
name = "solar_prominence"
provider = "solar_prominence"
db_file = "state/solar_prominence.db"

# Relative local paths are resolved from this file and converted to file:// URLs automatically.
[[sources.targets]]
url = "./data/AIAsynoptic0304.prominence.txt"
state_file = "state/AIAsynoptic0304.prominence.txt.old"
attachment_path = "./data/AIAsynoptic0304.prominence.png"
time_threshold_minutes = 10
remove_threshold_minutes = 60
distance_threshold = 50
area_threshold = 1000

[[sources]]
name = "atmospheric_optics"
provider = "atmospheric_optics"
db_file = "state/atmospheric_optics.db"

[[sources.targets]]
name = "Home"
url = "atmospheric-optics://home"
threshold = 0.8
timeout_seconds = 180
lat = 32.82
lon = -96.82
mode = "observed"
illumination = "solar"
project_dir = "../atmospheric_optics"
phenomena = [
  "halo",
  "parhelia",
  "cza",
  "circumhorizontal_arc",
  "upper_tangent_arc",
  "sun_pillar",
  "crepuscular_rays",
  "rainbow",
  "fogbow",
]
